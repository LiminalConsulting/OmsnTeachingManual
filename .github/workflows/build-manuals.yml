name: Build Manuals

on:
  push:
    branches: [main]
    paths:
      - 'subjects/**/manual/*.md'
      - 'subjects/**/exercises/*.md'
      - 'shared/build.sh'
      - 'shared/build_exercises.sh'
      - 'build_all.sh'
  workflow_dispatch:
    inputs:
      subject:
        description: 'Subject to rebuild (math | physics | sciences | history | all)'
        default: 'all'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: /usr/share/texmf
          key: texlive-${{ runner.os }}-v1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc \
            texlive-xetex \
            texlive-lang-portuguese \
            texlive-latex-extra \
            ghostscript \
            poppler-utils

      - name: Build
        run: bash build_all.sh ${{ github.event.inputs.subject || 'all' }}

      - name: Commit rebuilt PDFs
        run: |
          git config user.name "OMSN Build Bot"
          git config user.email "build-bot@omsn.pt"
          git add $(find . -name "*.pdf" | grep -v ".git")
          git diff --staged --quiet && echo "No PDF changes." || \
            git commit -m "Auto-rebuild PDFs [skip ci]" && git push
